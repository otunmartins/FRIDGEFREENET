# Conda env: GROMACS + Acpype + AmberTools + RDKit + OpenMM + MCP
name: insulin-ai-sim
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.11
  - rdkit
  - gromacs
  - ambertools
  - openmm
  - pdbfixer
  - pip
  - pip:
    - openmmforcefields>=0.14.0
    - openff-toolkit>=0.18.0
    - acpype>=2023.4
    - packmol>=21.0
    - git+https://github.com/FermiQ/psmiles.git
    - mcp>=1.0.0
    - fastmcp>=0.1.0
    - requests>=2.28.0
    - duckduckgo-search>=8.0.0
    - paper-qa>=2026.2
    - pytest>=7.4.0
    - -e .
