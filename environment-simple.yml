name: insulin-ai
channels:
  - conda-forge
  - defaults

dependencies:
  # Core Python
  - python=3.10
  
  # Essential Scientific Computing
  - numpy=1.24.*
  - pandas=2.0.*
  - matplotlib=3.7.*
  
  # Web Framework
  - pip
  
  # Install additional packages via pip
  - pip:
    # Core application dependencies
    - streamlit>=1.28.0
    - openai>=1.0.0
    - langchain>=0.0.350
    - langchain-openai
    - langchain-community
    - langgraph>=0.0.65
    
    # Basic scientific packages
    - scipy>=1.11.0
    - scikit-learn>=1.3.0
    
    # Chemistry basics (lightweight versions)
    - rdkit-pypi  # Simpler installation than conda rdkit
    
    # Development and testing
    - pytest>=7.0.0
    - requests>=2.31.0
    
    # Data handling
    - beautifulsoup4>=4.12.0
    - lxml>=4.9.0
    
    # Utilities
    - tqdm>=4.65.0
    - python-dotenv>=1.0.0 